<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment - Classic Cuts</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="./assets/css/book.css">
    
</head>
<body>

    <nav class="navbar">
        <div class="logo">Classic Cuts</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#services">Services</a></li>
            <li><a href="admin.html"><i class="fa-solid fa-lock"></i> Admin</a></li>
            <li><a href="book.html" class="active" style="color: var(--accent-gold);">Book Now</a></li>
        </ul>
    </nav>

    <div class="booking-page-wrapper">
        <div class="modern-booking-container reveal">
            
            <div class="booking-info">
                <h2>Secure Your<br>Chair.</h2>
                <p>Don't wait in line. Book your time slot now and get the premium grooming experience you deserve.</p>
                
                <ul class="perks-list">
                    <li><i class="fa-solid fa-mug-hot"></i> Complimentary Coffee</li>
                    <li><i class="fa-solid fa-wifi"></i> Fast Free Wi-Fi</li>
                    <li><i class="fa-solid fa-clock"></i> No Wait Times</li>
                </ul>
            </div>

            <div class="booking-form-area">
                <form id="bookingForm">
                    <div class="form-group reveal">
                        <label for="name"><i class="fa-regular fa-user"></i> Full Name</label>
                        <input type="text" id="name" placeholder="John Doe" required>
                    </div>

                    <div class="form-group reveal">
                        <label for="service"><i class="fa-solid fa-scissors"></i> Select Service</label>
                        <select id="service" required>
                            <option value="fade">The Classic Fade - $25</option>
                            <option value="beard">Beard Trim - $15</option>
                            <option value="full">The Full Package - $35</option>
                        </select>
                    </div>

                    <div class="form-group reveal">
                        <label for="date"><i class="fa-regular fa-calendar"></i> Choose Date</label>
                        <input type="date" id="date" placeholder="Select a day..." required>
                    </div>

                    <div class="form-group" id="timeSelection" style="display: none;">
                        <label><i class="fa-regular fa-clock"></i> Available Times</label>
                        <div id="timeSlots"></div>
                        <input type="hidden" id="selectedTime" required>
                    </div>

                    <button type="submit" class="cta-btn reveal" style="width: 100%; margin-top: 1rem;">Confirm Booking</button>
                </form>
            </div>
            
        </div>
    </div>

    <script src="./assets/js/script.js"></script>
</body>
</html>
